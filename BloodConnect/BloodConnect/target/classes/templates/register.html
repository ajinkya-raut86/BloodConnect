<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>BloodConnect - Donor Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
        background: linear-gradient(120deg,#ff4b5c,#ff6b6b);
        height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        font-family:Arial;
        }

        .card{
        border-radius:20px;
        padding:30px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .title{
        color:#ff4b5c;
        font-weight:bold;
        }

        .btn-custom{
        background:#ff4b5c;
        color:white;
        border:none;
        }

        .btn-custom:hover{
        background:#e63946;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card">

                <h2 class="text-center title mb-4">BloodConnect</h2>

                <h5 class="text-center mb-4">Donor Registration</h5>

                <form action="/saveDonor" method="post">

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" name="name" placeholder="Enter your name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Blood Group</label>

                        <select class="form-control" name="bloodGroup" required>

                            <option value="">Select Blood Group</option>
                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>O+</option>
                            <option>O-</option>
                            <option>AB+</option>
                            <option>AB-</option>

                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" class="form-control" name="phone" placeholder="Enter phone number" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control" name="city" placeholder="Enter your city" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control" name="age" placeholder="Enter your age" required>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-custom">Register as Donor</button>
                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
